trigger:
  branches:
    include:
      - main

pool: vikrantagent

stages:
- stage: Security_And_Deployment
  displayName: "Gitleaks Scan & Terraform Infrastructure Deployment"

  jobs:
  - job: TerraformDeploy
    displayName: "Security Scan and Terraform Init Plan Apply"
    steps:
    
    # =================================================================
    # STEP 1: GITLEAKS SECRET SECURITY SCAN (Before Terraform Execution)
    # =================================================================
    - script: |
        echo "Starting Gitleaks Secrets Analysis..."
        C:\gitleaks\gitleaks.exe detect --no-git --verbose --redact
      displayName: 'Run Gitleaks Security Scan'
      continueOnError: false

    # =================================================================
    # STEP 2: TERRAFORM INSTALLATION & EXECUTION
    # =================================================================
    - task: TerraformInstaller@1
      displayName: "Install Terraform"
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'vikrantscn'
        backendAzureRmResourceGroupName: 'RG-DEV'
        backendAzureRmStorageAccountName: 'vikrantstorage9987'
        backendAzureRmContainerName: 'pravinnekramvikram'
        backendAzureRmKey: 'terraform.tfstate'

    - task: TerraformTask@5
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'vikrantscn'

    - task: TerraformTask@5
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        commandOptions: '-auto-approve'
        environmentServiceNameAzureRM: 'vikrantscn'
